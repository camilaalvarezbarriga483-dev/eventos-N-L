<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eventos N&L | Bienvenida</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background-color: #111;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            color: white;
            margin: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-weight: bold;
        }

        nav a:hover {
            color: #2585d3;
        }

        /* BIENVENIDA */
        .bienvenida {
            text-align: center;
            padding: 80px 20px;
            background-color: white;
        }

        .bienvenida h2 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .bienvenida p {
            font-size: 18px;
            color: #555;
            max-width: 700px;
            margin: auto;
        }

        /* GALERÍA */
        .galeria {
            display: flex;
            gap: 25px;
            padding: 60px 40px;
            max-width: 1200px;
            margin: auto;
            flex-wrap: wrap;
            justify-content: center;
        }

        .galeria img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .bienvenida h2 {
                font-size: 28px;
            }

            .galeria img {
                width: 100%;
                max-width: 350px;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <h1>Eventos N&L</h1>
        <div>
            <a href="pack.html">PACK</a>
            <a href="contacto.html">CONTACTO</a>
        </div>
    </nav>

    <!-- BIENVENIDA -->
    <section class="bienvenida">
        <h2>Bienvenidos a Eventos N&L</h2>
        <p>
            Creamos experiencias únicas y momentos inolvidables.
            Nos encargamos de cada detalle para que tu evento sea perfecto.
        </p>
    </section>

    <!-- IMÁGENES -->
    <section class="galeria">
        <!-- Cambia las imágenes por las tuyas -->
        <img src="ojo.png" alt="Evento 1">
        <img src="ojo.png" alt="Evento 2">
        <img src="ojo.png" alt="Evento 3">
    </section>

</body>
</html>
